<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codexa | SaaS Landing Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="hero-wrapper">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>

    <section class="hero-card">
      <p class="brand">Codexa</p>
      <p class="tagline">Empowering Your Digital Journey</p>

      <h1>Modern Web Applications for Businesses</h1>
      <p class="subtext">I build fast and elegant web applications for businesses</p>

      <div class="actions">
        <a href="#" class="btn btn-primary">Start Your Website</a>
        <a href="https://wa.me/91XXXXXXXXXX" class="btn btn-secondary">Contact on WhatsApp</a>
      </div>
    </section>
  </main>

  <section class="stats-section" aria-label="SaaS performance statistics">
    <div class="stats-container">
      <article class="stat-card">
        <h2 class="stat-number">100+</h2>
        <p class="stat-label">Projects Completed</p>
      </article>

      <article class="stat-card">
        <h2 class="stat-number">50+</h2>
        <p class="stat-label">Happy Clients</p>
      </article>

      <article class="stat-card">
        <h2 class="stat-number">2+</h2>
        <p class="stat-label">Years Experience</p>
      </article>

      <article class="stat-card">
        <h2 class="stat-number">24/7</h2>
        <p class="stat-label">Support</p>
      </article>
    </div>
  </section>
</body>
</html>
